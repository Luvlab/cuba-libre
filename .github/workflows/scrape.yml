name: OSM Scraper — 4× daily

# Runs at 00:00, 06:00, 12:00, 18:00 UTC every day
# Connects directly to the database — no Vercel function timeout limit.
#
# Required GitHub secrets:
#   DATABASE_URL  — Supabase connection string (same value as Vercel env var)
#
# Optional secrets (used if you want the cron endpoint hit instead of direct DB):
#   CRON_SECRET   — must match backend CRON_SECRET env var
#   API_URL       — e.g. https://api.cuba.red

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:               # allow manual trigger from GitHub UI
    inputs:
      province:
        description: 'Province to scrape (leave blank for all Cuba)'
        required: false
        default: ''
      type:
        description: 'OSM type filter (amenity / shop / tourism / leisure)'
        required: false
        default: ''
      limit:
        description: 'Max elements'
        required: false
        default: '50000'
      dry_run:
        description: 'Dry run (no DB writes)'
        type: boolean
        required: false
        default: false

jobs:
  scrape:
    name: Scrape OSM → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma generate

      - name: Run OSM scraper
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV:     production
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.province }}" ]; then
            ARGS="$ARGS --province \"${{ github.event.inputs.province }}\""
          fi
          if [ -n "${{ github.event.inputs.type }}" ]; then
            ARGS="$ARGS --type ${{ github.event.inputs.type }}"
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          eval "npx ts-node src/scraper/osm.ts $ARGS"

      - name: Summary
        if: always()
        run: echo "OSM scrape completed at $(date -u)"
